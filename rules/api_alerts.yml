groups:
  - name: api_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(demo_http_requests_total{status="500"}[5m]) / rate(demo_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreur élevé sur demo-api"

global:
  scrape_interval: 10s
  external_labels:
    environment: lab

rule_files:
  - '/etc/prometheus/rules/*.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    file_sd_configs:
      - files:
          - '/etc/prometheus/sd/*.json'
        refresh_interval: 5s

  - job_name: 'demo-api'
    static_configs:
      - targets: ['demo-api:8000']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
